<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>校园管理系统 | 登录注册</title>
    <!-- Vue 2 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <!-- Axios HTTP 客户端 -->
    <script src="https://unpkg.com/axios@1.6.2/dist/axios.min.js"></script>
    <style>
        /* ----- 全局样式重置 & 基础布局 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
        }
        /* 渐变色背景，垂直居中容器 */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
        }
        /* 右上角校徽图片容器 */
        .top-right-img {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            padding: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(4px);
        }
        .top-right-img img {
            width: 80px;
            height: auto;
            display: block;
            border-radius: 10px;
        }
        /* 主卡片容器 */
        .app-container {
            width: 100%;
            max-width: 550px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        /* Tab 切换栏 */
        .tabs {
            display: flex;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 16px 0;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #475569;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: #4f46e5;
            border-bottom-color: #4f46e5;
            background: white;
        }
        /* 表单公用面板 */
        .form-panel {
            padding: 32px 28px 38px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #334155;
            margin-bottom: 6px;
        }
        input, select {
            width: 100%;
            padding: 12px 14px;
            font-size: 0.95rem;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            outline: none;
            transition: 0.2s;
            background: #fff;
        }
        input:focus, select:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        /* 按钮样式 */
        .btn {
            width: 100%;
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .btn:hover {
            background: #4338ca;
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #64748b;
            margin-top: 12px;
        }
        /* 提示信息组件 */
        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 0.85rem;
            margin-bottom: 18px;
            border-left: 4px solid #ef4444;
        }
        .success-msg {
            background: #dcfce7;
            color: #166534;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 0.85rem;
            margin-bottom: 18px;
            border-left: 4px solid #22c55e;
        }
        .info-text {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 16px;
            color: #6c757d;
        }
        .role-badge {
            display: inline-block;
            background: #eef2ff;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #4f46e5;
        }
        .welcome-card {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .small-note {
            font-size: 0.7rem;
            color: #6c757d;
            margin-top: 12px;
            text-align: center;
        }
        .flex-btns {
            display: flex;
            gap: 12px;
        }
        .flex-btns .btn {
            flex: 1;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- 校徽图片（右上角固定） -->
    <div class="top-right-img">
        <img src="/images/5120234579.png" alt="校徽" @error="imgError">
    </div>
    <div class="app-container">
        <!-- 登录/注册 选项卡 -->
        <div class="tabs">
            <div class="tab-btn" :class="{ active: activeTab === 'login' }" @click="activeTab = 'login'">🔐 登录</div>
            <div class="tab-btn" :class="{ active: activeTab === 'register' }" @click="resetRegisterFlow">📝 注册账号</div>
        </div>

        <!-- ================= 登录面板 ================= -->
        <div class="form-panel" v-if="activeTab === 'login'">
            <div v-if="loginError" class="error-msg">{{ loginError }}</div>
            <div v-if="loginSuccessMsg" class="success-msg">{{ loginSuccessMsg }}</div>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" v-model="loginForm.username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" v-model="loginForm.password" placeholder="请输入密码" @keyup.enter="handleLogin">
            </div>
            <button class="btn" @click="handleLogin" :disabled="loginLoading">{{ loginLoading ? '登录中...' : '登录' }}</button>
            <div class="info-text">演示：学生/教师账号需先完成注册</div>
        </div>

        <!-- ================= 注册面板（两步注册） ================= -->
        <div class="form-panel" v-if="activeTab === 'register'">
            <div v-if="registerGlobalError" class="error-msg">{{ registerGlobalError }}</div>
            <div v-if="registerGlobalSuccess" class="success-msg">{{ registerGlobalSuccess }}</div>

            <!-- 步骤1：基础账号信息（用户名/密码/角色） -->
            <div v-if="registerStep === 1">
                <div class="form-group">
                    <label>用户名 *</label>
                    <input type="text" v-model="baseRegForm.username" placeholder="唯一用户名">
                </div>
                <div class="form-group">
                    <label>密码 *</label>
                    <input type="password" v-model="baseRegForm.password" placeholder="至少6位">
                </div>
                <div class="form-group">
                    <label>角色 *</label>
                    <select v-model="baseRegForm.role">
                        <option value="ROLE_STUDENT">👩‍🎓 学生</option>
                        <option value="ROLE_TEACHER">👨‍🏫 教师</option>
                    </select>
                </div>
                <button class="btn" @click="submitBaseRegister" :disabled="baseRegLoading">{{ baseRegLoading ? '创建账号中...' : '下一步：完善个人信息' }}</button>
                <div class="small-note">第一步仅创建基础账号，第二步完善详细信息</div>
            </div>

            <!-- 步骤2：根据角色补充学生或教师的个人档案 -->
            <div v-if="registerStep === 2 && tempUserId && tempRole">
                <div class="welcome-card">
                    <span>✅ 基础账号已创建 (ID: {{ tempUserId }})</span>
                    <span class="role-badge" style="margin-left: 8px;">{{ tempRole === 'ROLE_STUDENT' ? '学生身份' : '教师身份' }}</span>
                </div>

                <!-- 学生专属字段 -->
                <div v-if="tempRole === 'ROLE_STUDENT'">
                    <div class="form-group"><label>姓名 *</label><input v-model="studentProfile.name"></div>
                    <div class="form-group"><label>年龄</label><input type="number" v-model="studentProfile.age"></div>
                    <div class="form-group"><label>学号 *</label><input v-model="studentProfile.studentNumber"></div>
                    <div class="form-group"><label>专业</label><input v-model="studentProfile.major"></div>
                    <div class="form-group"><label>年级</label><input v-model="studentProfile.grade"></div>
                    <div class="form-group"><label>邮箱 *</label><input type="email" v-model="studentProfile.email" required>
                    </div>
                </div>
                <!-- 教师专属字段 -->
                <div v-if="tempRole === 'ROLE_TEACHER'">
                    <div class="form-group"><label>姓名 *</label><input v-model="teacherProfile.name"></div>
                    <div class="form-group"><label>工号 *</label><input v-model="teacherProfile.teacherNumber"></div>
                    <div class="form-group"><label>职称</label><input v-model="teacherProfile.title"></div>
                    <div class="form-group"><label>院系</label><input v-model="teacherProfile.department"></div>
                </div>

                <div class="flex-btns">
                    <button class="btn" @click="submitCompleteProfile" :disabled="completeLoading">{{ completeLoading ? '提交中...' : '✔ 完成注册' }}</button>
                    <button class="btn btn-secondary" @click="resetRegisterFlow">⟳ 重新注册</button>
                </div>
                <div class="small-note">完善后即可使用账号密码登录</div>
            </div>
        </div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // Axios 全局配置：统一错误消息提取，简化错误处理
    // --------------------------------------------------------------
    axios.defaults.baseURL = '';
    axios.interceptors.response.use(
        response => response,
        error => {
            if (error.response) {
                const errData = error.response.data;
                const msg = errData?.message || errData?.error || `请求失败: ${error.response.status}`;
                return Promise.reject({ message: msg });
            }
            return Promise.reject({ message: error.message || '网络错误' });
        }
    );

    new Vue({
        el: '#app',
        data: {
            // 当前激活的tab: 'login' 或 'register'
            activeTab: 'login',
            // 登录表单数据
            loginForm: { username: '', password: '' },
            loginLoading: false,
            loginError: '',
            loginSuccessMsg: '',

            // 注册流程步骤: 1-基础信息，2-详细档案
            registerStep: 1,
            // 步骤1的基础注册表单
            baseRegForm: { username: '', password: '', role: 'ROLE_STUDENT' },
            baseRegLoading: false,
            registerGlobalError: '',
            registerGlobalSuccess: '',
            // 步骤1成功后后端返回的临时用户ID及角色
            tempUserId: null,
            tempRole: null,
            // 学生档案模型（步骤2）
            studentProfile: { name: '', age: null, studentNumber: '', major: '', grade: '',
                email: ''  },
            // 教师档案模型（步骤2）
            teacherProfile: { name: '', teacherNumber: '', title: '', department: '' },
            completeLoading: false
        },
        methods: {
            /**
             * 重置整个注册流程到初始状态
             * 清空所有临时数据、表单、错误提示，并强制切换到注册面板
             */
            resetRegisterFlow() {
                this.registerStep = 1;
                this.baseRegForm = { username: '', password: '', role: 'ROLE_STUDENT' };
                this.registerGlobalError = '';
                this.registerGlobalSuccess = '';
                this.tempUserId = null;
                this.tempRole = null;
                this.studentProfile = { name: '', age: null, studentNumber: '', major: '', grade: '' };
                this.teacherProfile = { name: '', teacherNumber: '', title: '', department: '' };
                this.baseRegLoading = false;
                this.completeLoading = false;
                this.activeTab = 'register';
            },

            /**
             * 步骤1: 提交基础注册信息（用户名/密码/角色）
             * 调用后端 /api/auth/register/init 接口，成功后进入步骤2
             */
            async submitBaseRegister() {
                if (!this.baseRegForm.username.trim()) {
                    this.registerGlobalError = '用户名不能为空';
                    return;
                }
                if (this.baseRegForm.username.length < 3) {
                    this.registerGlobalError = '用户名至少3个字符';
                    return;
                }
                if (!this.baseRegForm.password || this.baseRegForm.password.length < 6) {
                    this.registerGlobalError = '密码至少6位';
                    return;
                }
                this.baseRegLoading = true;
                this.registerGlobalError = '';
                try {
                    const res = await axios.post('/api/auth/register/init', {
                        username: this.baseRegForm.username.trim(),
                        password: this.baseRegForm.password,
                        role: this.baseRegForm.role
                    });
                    const data = res.data;
                    if (data.userId && data.role) {
                        // 存储临时用户标识，进入第二步信息完善
                        this.tempUserId = data.userId;
                        this.tempRole = data.role;
                        this.registerStep = 2;
                        this.registerGlobalSuccess = data.message || '基础账号创建成功，请填写详细信息';
                        setTimeout(() => (this.registerGlobalSuccess = ''), 3000);
                    } else {
                        throw new Error('响应数据异常');
                    }
                } catch (err) {
                    this.registerGlobalError = err.message || '注册失败，请重试';
                } finally {
                    this.baseRegLoading = false;
                }
            },

            /**
             * 步骤2: 根据角色提交完整的个人档案（学生或教师）
             * 分别调用 /api/auth/register/student/{id} 或 /api/auth/register/teacher/{id}
             * 完成后自动切换至登录面板并预填用户名，提升用户体验
             */
            async submitCompleteProfile() {
                if (!this.tempUserId || !this.tempRole) {
                    this.registerGlobalError = '用户信息丢失，请重新注册';
                    this.resetRegisterFlow();
                    return;
                }
                // 字段校验
                if (this.tempRole === 'ROLE_STUDENT') {
                    if (!this.studentProfile.name?.trim()) {
                        this.registerGlobalError = '学生姓名不能为空';
                        return;
                    }
                    if (!this.studentProfile.studentNumber?.trim()) {
                        this.registerGlobalError = '学号不能为空';
                        return;
                    }
                } else {
                    if (!this.teacherProfile.name?.trim()) {
                        this.registerGlobalError = '教师姓名不能为空';
                        return;
                    }
                    if (!this.teacherProfile.teacherNumber?.trim()) {
                        this.registerGlobalError = '工号不能为空';
                        return;
                    }
                }

                this.completeLoading = true;
                this.registerGlobalError = '';
                try {
                    let url = '';
                    let body = {};
                    if (this.tempRole === 'ROLE_STUDENT') {
                        url = `/api/auth/register/student/${this.tempUserId}`;
                        body = {
                            name: this.studentProfile.name.trim(),
                            age: this.studentProfile.age ? Number(this.studentProfile.age) : null,
                            studentNumber: this.studentProfile.studentNumber.trim(),
                            major: this.studentProfile.major?.trim() || '',
                            grade: this.studentProfile.grade?.trim() || '',
                            email: this.studentProfile.email.trim()
                        };
                    } else {
                        url = `/api/auth/register/teacher/${this.tempUserId}`;
                        body = {
                            name: this.teacherProfile.name.trim(),
                            teacherNumber: this.teacherProfile.teacherNumber.trim(),
                            title: this.teacherProfile.title?.trim() || '',
                            department: this.teacherProfile.department?.trim() || ''
                        };
                    }
                    await axios.post(url, body);

                    // 注册成功，显示成功消息，3秒后自动跳转登录页并预填用户名
                    this.registerGlobalSuccess = '注册成功！3秒后自动跳转登录...';
                    setTimeout(() => {
                        this.activeTab = 'login';
                        // 预填登录表单中的用户名（提升便利性），密码清空需用户重新输入
                        this.loginForm.username = this.baseRegForm.username;
                        this.loginForm.password = '';
                        // 重置注册相关状态，避免残留数据干扰
                        this.registerStep = 1;
                        this.tempUserId = null;
                        this.tempRole = null;
                        this.registerGlobalSuccess = '';
                    }, 3000);
                } catch (err) {
                    this.registerGlobalError = err.message || '完善信息失败，请检查学号/工号是否重复';
                } finally {
                    this.completeLoading = false;
                }
            },

            /**
             * 用户登录处理
             * 调用 /api/auth/login 接口，成功后存储 JWT token 及角色信息，并根据角色跳转至对应控制台
             * 学生 -> student.html, 教师 -> teacher.html, 管理员 -> admin.html
             */
            async handleLogin() {
                if (!this.loginForm.username.trim() || !this.loginForm.password) {
                    this.loginError = '请输入用户名和密码';
                    return;
                }
                this.loginLoading = true;
                this.loginError = '';
                this.loginSuccessMsg = '';
                try {
                    const res = await axios.post('/api/auth/login', {
                        username: this.loginForm.username,
                        password: this.loginForm.password
                    });
                    const { token, username, role } = res.data;
                    if (token) {
                        // 持久化存储身份凭证
                        localStorage.setItem('jwt_token', token);
                        localStorage.setItem('username', username);
                        localStorage.setItem('role', role);
                        // 根据角色进行页面跳转
                        if (role === 'ROLE_ADMIN') {
                            window.location.href = '/admin.html';
                        } else if (role === 'ROLE_STUDENT') {
                            window.location.href = '/student.html';
                        } else if (role === 'ROLE_TEACHER') {
                            window.location.href = '/teacher.html';
                        } else {
                            alert('未知角色，请联系管理员');
                        }
                    } else {
                        throw new Error('登录凭证无效');
                    }
                } catch (err) {
                    this.loginError = err.message || '用户名或密码错误';
                } finally {
                    this.loginLoading = false;
                }
            },

            /**
             * 校徽图片加载失败时的占位处理（仅控制台警告，不影响界面）
             */
            imgError(e) {
                console.warn('图片加载失败，请检查图片路径: /images/5120234579.png');
            }
        }
    });
</script>
</body>
</html>
