spring:
  application:
    name: cs

  datasource:
    url: jdbc:mysql://localhost:3306/cs?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: Sa123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      password:          # 若无密码，留空
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  rabbitmq:
    host: localhost
    ports:
      - "5672:5672"
      - "15672:15672"
    username: guest
    password: guest

  mail:
    host: smtp.qq.com
    port: 587
    username: 3220153787@qq.com
    password: vhsomjwnpvltddjh   # 请使用授权码，不是QQ密码
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  elasticsearch:
    image: elasticsearch:7.17.15
    container_name: cs-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - cs-network

# 自定义 RabbitMQ 队列/交换器配置（需要在代码中通过 @ConfigurationProperties 绑定）
rabbitmq:
  queue:
    name: enroll.notification.queue
  exchange:
    name: enroll.exchange
  routing:
    key: enroll.notification.key

# JWT 配置
jwt:
  secret: yourSecretKeyMustBeAtLeast32CharactersLong
  expiration: 864000000